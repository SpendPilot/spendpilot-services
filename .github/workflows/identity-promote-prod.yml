name: Identity Promote Prod

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Production release version, example: v1.0.0"
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  AZURE_CLIENT_ID_VALUE: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID_VALUE: ${{ vars.AZURE_TENANT_ID != '' && vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID_VALUE: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
  GITOPS_REPOSITORY: SpendPilot/spendpilot-gitops
  SOURCE_VALUES_FILE: environments/staging/values/spendpilot-values.yaml
  TARGET_VALUES_FILE: environments/prod/values/spendpilot-values.yaml

jobs:
  promote-prod:
    name: Promote Identity From Staging to Prod
    runs-on: ubuntu-latest

    steps:
      - name: Validate release version
        run: |
          RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version. Use format vMAJOR.MINOR.PATCH, example v1.0.0"
            exit 1
          fi
        shell: bash

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: main
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Read image metadata from staging
        id: source
        working-directory: gitops
        run: |
          test -f "$SOURCE_VALUES_FILE"
          IMAGE_REPOSITORY="$(yq e '.identityService.image.repository' "$SOURCE_VALUES_FILE")"
          IMAGE_TAG="$(yq e '.identityService.image.tag' "$SOURCE_VALUES_FILE")"
          IMAGE_DIGEST="$(yq e '.identityService.image.digest' "$SOURCE_VALUES_FILE")"

          if [[ -z "$IMAGE_REPOSITORY" || "$IMAGE_REPOSITORY" == "null" ]]; then
            echo "Staging identity image repository is missing."
            exit 1
          fi
          if [[ -z "$IMAGE_TAG" || "$IMAGE_TAG" == "null" ]]; then
            echo "Staging identity image tag is missing."
            exit 1
          fi
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "Staging identity image digest is invalid: $IMAGE_DIGEST"
            exit 1
          fi

          echo "image_repository=$IMAGE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_digest=$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Validate Azure OIDC inputs
        run: |
          if [[ -z "$AZURE_CLIENT_ID_VALUE" ]]; then
            echo "Missing AZURE_CLIENT_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
          if [[ -z "$AZURE_TENANT_ID_VALUE" ]]; then
            echo "Missing AZURE_TENANT_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
          if [[ -z "$AZURE_SUBSCRIPTION_ID_VALUE" ]]; then
            echo "Missing AZURE_SUBSCRIPTION_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
        shell: bash

      - name: Log in to Azure using GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID_VALUE }}
          tenant-id: ${{ env.AZURE_TENANT_ID_VALUE }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID_VALUE }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Create release tag from staging digest
        env:
          IMAGE_REPOSITORY: ${{ steps.source.outputs.image_repository }}
          STAGING_DIGEST: ${{ steps.source.outputs.image_digest }}
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          docker pull "$IMAGE_REPOSITORY@$STAGING_DIGEST"
          docker tag "$IMAGE_REPOSITORY@$STAGING_DIGEST" "$IMAGE_REPOSITORY:$RELEASE_VERSION"
          docker push "$IMAGE_REPOSITORY:$RELEASE_VERSION"
        shell: bash

      - name: Update prod values
        working-directory: gitops
        env:
          IMAGE_REPOSITORY: ${{ steps.source.outputs.image_repository }}
          IMAGE_TAG: ${{ github.event.inputs.release_version }}
          IMAGE_DIGEST: ${{ steps.source.outputs.image_digest }}
        run: |
          test -f "$TARGET_VALUES_FILE"
          yq -i '.identityService.image.repository = strenv(IMAGE_REPOSITORY)' "$TARGET_VALUES_FILE"
          yq -i '.identityService.image.tag = strenv(IMAGE_TAG)' "$TARGET_VALUES_FILE"
          yq -i '.identityService.image.digest = strenv(IMAGE_DIGEST)' "$TARGET_VALUES_FILE"
          yq -i '.migrationJob.image.repository = strenv(IMAGE_REPOSITORY)' "$TARGET_VALUES_FILE"
          yq -i '.migrationJob.image.tag = strenv(IMAGE_TAG)' "$TARGET_VALUES_FILE"
          yq -i '.migrationJob.image.digest = strenv(IMAGE_DIGEST)' "$TARGET_VALUES_FILE"
        shell: bash

      - name: Create prod promotion PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops
          commit-message: "[skip ci] chore(prod): promote ${{ github.event.inputs.release_version }}"
          branch: chore/prod-promote-identity-${{ github.event.inputs.release_version }}
          delete-branch: true
          title: "chore(prod): promote identity ${{ github.event.inputs.release_version }}"
          body: |
            Promote the identity service image from staging to prod.

            Source of truth:
            - repository: `${{ steps.source.outputs.image_repository }}`
            - previous staging tag: `${{ steps.source.outputs.image_tag }}`
            - release tag: `${{ github.event.inputs.release_version }}`
            - digest: `${{ steps.source.outputs.image_digest }}`

            This PR was created automatically by the manual prod promotion workflow. Production keeps the semantic version tag for readability and still deploys by digest.
          add-paths: |
            ${{ env.TARGET_VALUES_FILE }}
