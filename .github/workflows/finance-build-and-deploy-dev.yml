name: Finance Build and Deploy Dev

# Trigger refresh to re-run finance dev build workflow.

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/finance-build-and-deploy-dev.yml"
      - ".github/workflows/finance-promote-staging.yml"
      - ".github/workflows/finance-promote-prod.yml"
      - "services/finance/**"
      - "app/core/**"
      - "app/db/**"
      - "app/models/**"
      - "app/api/routes/health.py"
      - "app/api/routes/finance.py"
      - "app/schemas/common.py"
      - "app/schemas/finance.py"
      - "app/services/email_queue.py"
      - "app/services/finance_service.py"
      - "app/services/audit_service.py"
      - "app/main.py"
      - "app/app_factory.py"
      - "alembic.ini"
      - "pyproject.toml"
      - ".dockerignore"
      - ".env.example"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_REPOSITORY: ${{ vars.ACR_LOGIN_SERVER }}/spend-control-finance
  GITOPS_REPOSITORY: SpendPilot/spendpilot-gitops
  DEV_VALUES_FILE: environments/dev/values/spendpilot-values.yaml
  AZURE_CLIENT_ID_VALUE: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID_VALUE: ${{ vars.AZURE_TENANT_ID != '' && vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID_VALUE: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  build-and-deploy-dev:
    name: Build Once and Update Dev GitOps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e .[dev]

      - name: Run lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Build package
        run: python -m build

      - name: Validate Azure OIDC inputs
        run: |
          if [[ -z "$AZURE_CLIENT_ID_VALUE" ]]; then
            echo "Missing AZURE_CLIENT_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
          if [[ -z "$AZURE_TENANT_ID_VALUE" ]]; then
            echo "Missing AZURE_TENANT_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
          if [[ -z "$AZURE_SUBSCRIPTION_ID_VALUE" ]]; then
            echo "Missing AZURE_SUBSCRIPTION_ID. Set it as a GitHub variable or secret."
            exit 1
          fi
        shell: bash

      - name: Log in to Azure using GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID_VALUE }}
          tenant-id: ${{ env.AZURE_TENANT_ID_VALUE }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID_VALUE }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.image_tag }}
          labels: |
            org.opencontainers.image.title=SpendPilot Finance Service
            org.opencontainers.image.description=SpendPilot finance service container image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push finance image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/finance/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate published digest
        run: |
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "Invalid or missing image digest: ${IMAGE_DIGEST}"
            exit 1
          fi
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: main
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update dev finance image values
        working-directory: gitops
        env:
          IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          test -f "$DEV_VALUES_FILE"
          yq -i '.financeService.image.repository = strenv(IMAGE_REPOSITORY)' "$DEV_VALUES_FILE"
          yq -i '.financeService.image.tag = strenv(IMAGE_TAG)' "$DEV_VALUES_FILE"
          yq -i '.financeService.image.digest = strenv(IMAGE_DIGEST)' "$DEV_VALUES_FILE"
        shell: bash

      - name: Commit and push dev GitOps update
        working-directory: gitops
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          if git diff --quiet -- "$DEV_VALUES_FILE"; then
            echo "No GitOps changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DEV_VALUES_FILE"
          git commit -m "[skip ci] chore(dev): deploy finance image ${IMAGE_TAG}"
          git pull --rebase origin main
          git push origin HEAD:main
        shell: bash
