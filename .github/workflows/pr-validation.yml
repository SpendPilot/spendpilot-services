name: Services PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Lint, Test, Build, and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e .[dev]

      - name: Run lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Build package
        run: python -m build

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            "-Dsonar.organization=${{ vars.SONAR_ORGANIZATION != '' && vars.SONAR_ORGANIZATION || 'SpendPilot' }}"
            "-Dsonar.projectKey=SpendPilot_spendpilot-services"
            "-Dsonar.projectName=spendpilot-services"

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk scan
        run: snyk test --all-projects --detection-depth=3
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
