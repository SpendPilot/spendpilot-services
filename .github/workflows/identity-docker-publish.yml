name: Identity Service CI and Publish to ACR

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/identity-docker-publish.yml"
      - "services/identity/**"
      - "app/core/**"
      - "app/db/**"
      - "app/models/**"
      - "app/api/routes/health.py"
      - "app/api/routes/auth.py"
      - "app/api/routes/admin.py"
      - "app/schemas/common.py"
      - "app/schemas/auth.py"
      - "app/services/user_service.py"
      - "app/main.py"
      - "app/app_factory.py"
      - "alembic.ini"
      - "pyproject.toml"
      - ".dockerignore"
      - ".env.example"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_REPOSITORY: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.ACR_IDENTITY_REPOSITORY || 'spend-control-identity' }}

jobs:
  validate:
    name: Lint, Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e .[dev]

      - name: Run lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Build package
        run: python -m build

  docker:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure using GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=SpendPilot Identity Service
            org.opencontainers.image.description=SpendPilot identity service container image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push identity image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/identity/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show published image
        run: |
          echo "Published image:"
          echo "${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}"
