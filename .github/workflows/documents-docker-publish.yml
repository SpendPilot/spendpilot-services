name: Documents Service CI and Publish to ACR

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/documents-docker-publish.yml"
      - "services/documents/**"
      - "app/core/**"
      - "app/db/**"
      - "app/models/**"
      - "app/api/routes/health.py"
      - "app/api/routes/documents.py"
      - "app/api/routes/ai.py"
      - "app/schemas/common.py"
      - "app/schemas/documents.py"
      - "app/schemas/ai.py"
      - "app/services/document_service.py"
      - "app/services/ai_foundry_service.py"
      - "app/services/ai_chat_service.py"
      - "app/services/storage_service.py"
      - "app/services/policy_service.py"
      - "app/services/finance_service.py"
      - "app/services/audit_service.py"
      - "app/main.py"
      - "app/app_factory.py"
      - "alembic.ini"
      - "pyproject.toml"
      - ".dockerignore"
      - ".env.example"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write
#hi
env:
  IMAGE_REPOSITORY: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.ACR_DOCUMENTS_REPOSITORY || 'spend-control-documents' }}
  IMAGE_TAG: sha-${{ github.sha }}
  GITOPS_REPOSITORY: SpendPilot/spendpilot-gitops
  GITOPS_VALUES_FILE: environments/prod/values/spendpilot-values.yaml

jobs:
  validate:
    name: Lint, Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e .[dev]

      - name: Run lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Build package
        run: python -m build

  docker:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure using GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.title=SpendPilot Documents Service
            org.opencontainers.image.description=SpendPilot documents service container image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push documents image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/documents/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show published image
        run: |
          echo "Published image:"
          echo "${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: main
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update production documents image tag
        working-directory: gitops
        run: |
          yq -i '.documentsService.image.tag = strenv(IMAGE_TAG)' "${{ env.GITOPS_VALUES_FILE }}"
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Commit and push GitOps promotion
        working-directory: gitops
        run: |
          if git diff --quiet -- "${{ env.GITOPS_VALUES_FILE }}"; then
            echo "No GitOps changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ env.GITOPS_VALUES_FILE }}"
          git commit -m "Promote documents image to ${IMAGE_TAG}"
          git pull --rebase origin main
          git push origin HEAD:main
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
